[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"ksef" = "ksef"

[tool.setuptools.package-data]
"*" = ["*.xml"]

[project]
name = "ksef2.0_python"
version = "1.1.1"
description = "A Python client for integrating with KSeF 2.0 (Krajowy System e-Faktur), Poland's national electronic invoicing platform"
dependencies = [
  "requests",
  "cryptography",
  "python-dateutil",
  "endesive",
  "lxml",
  "signxml",
  "asn1crypto",
  "xml_konwerter"
]
requires-python = ">=3.10"
authors = [
  {name = "Stanisław Bartkowski", email = "stanislawbartkowski@gmail.com"},
]
readme = "README.md"
